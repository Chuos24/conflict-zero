[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NEXT_PUBLIC_BACKEND_URL = "https://api.conflictzero.com"
  NEXT_PUBLIC_API_URL = "https://api.conflictzero.com"

[[redirects]]
  from = "/api/*"
  to = "https://api.conflictzero.com/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
