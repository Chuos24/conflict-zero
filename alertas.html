<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Alertas - Conflict Zero</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-dark: #0A0A0F;
            --bg-card: #12121A;
            --gold: #C5A059;
            --gold-light: #D4AF37;
            --text: #F5F5F0;
            --text-muted: #A0A0A0;
            --border: #2A2A2E;
            --success: #1B3A2F;
            --warning: #8B6914;
            --danger: #8B0000;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            background-color: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
        }
        
        .header {
            padding: 20px 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: rgba(10, 10, 15, 0.95);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 16px;
            text-decoration: none;
        }
        
        .logo-icon {
            width: 36px; height: 36px;
            border: 1px solid var(--gold);
            display: flex; align-items: center; justify-content: center;
        }
        
        .logo-icon svg { width: 20px; height: 20px; stroke: var(--gold); stroke-width: 1.5; fill: none; }
        .logo-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 11px; font-weight: 400;
            letter-spacing: 0.35em; text-transform: uppercase;
            color: var(--gold);
        }
        
        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 12px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .back-link:hover { color: var(--gold); }
        
        .main {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 24px;
        }
        
        .page-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 8px;
        }
        
        .page-subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            font-weight: 300;
            margin-bottom: 32px;
        }
        
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 28px;
            margin-bottom: 24px;
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        
        .card-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 16px;
            font-weight: 300;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--gold);
        }
        
        .btn-primary {
            background: var(--gold);
            border: none;
            color: var(--bg-dark);
            padding: 12px 24px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary:hover { background: var(--gold-light); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-size: 11px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 14px 18px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 14px;
            outline: none;
        }
        
        .form-group input:focus, .form-group select:focus {
            border-color: var(--gold);
        }
        
        .alert-item {
            background: var(--bg-dark);
            border: 1px solid var(--border);
            padding: 20px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        
        .alert-info h4 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            font-weight: 400;
            color: var(--gold);
            margin-bottom: 8px;
        }
        
        .alert-info p {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        
        .alert-type {
            display: inline-block;
            padding: 4px 10px;
            font-size: 9px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        
        .type-score_drop { background: rgba(139, 105, 20, 0.2); color: var(--gold); }
        .type-new_sanction { background: rgba(139, 0, 0, 0.2); color: #CD5C5C; }
        .type-status_change { background: rgba(27, 58, 47, 0.3); color: #4A9B7F; }
        
        .btn-delete {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 8px 16px;
            font-size: 10px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
        }
        .btn-delete:hover { background: rgba(139, 0, 0, 0.2); }
        
        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-muted);
        }
        
        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        .plan-badge {
            display: inline-block;
            padding: 8px 16px;
            font-size: 11px;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border: 1px solid var(--gold);
            margin-bottom: 24px;
        }
        
        .spinner {
            width: 16px; height: 16px;
            border: 2px solid var(--bg-dark);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <header class="header">
        <a href="/" class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </div>
            <div class="logo-text">Conflict Zero</div>
        </a>
        <a href="/dashboard.html" class="back-link">← Volver al Dashboard</a>
    </header>
    
    <main class="main">
        <div class="page-title">Centro de Alertas</div>
        <div class="page-subtitle">Mis Alertas Configuradas</div>
        
        <div id="planBadge" class="plan-badge">Cargando...</div>
        
        <!-- Create Alert -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">Crear Nueva Alerta</div>
            </div>
            
            <form id="alertForm" onsubmit="handleCreateAlert(event)">
                <div class="form-group">
                    <label>Tipo de Alerta</label>
                    <select id="alertType" required>
                        <option value="">Seleccionar tipo...</option>
                        <option value="score_drop">Caída de Score (baja del umbral)</option>
                        <option value="new_sanction">Nueva Sanción OSCE/TCE</option>
                        <option value="status_change">Cambio de Estado SUNAT</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>RUC a Monitorear</label>
                    <input type="text" id="alertRuc" placeholder="20100123091" maxlength="11" required>
                </div>
                
                <button type="submit" class="btn-primary" id="submitBtn">Crear Alerta</button>
            </form>
        </div>
        
        <!-- Alert List -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">Alertas Activas</div>
            </div>
            
            <div id="alertsList">
                <div class="empty-state">
                    <div class="empty-icon">🔔</div>
                    <p>Cargando alertas...</p>
                </div>
            </div>
        </div>
    </main>
    
    <script>
        const API_BASE = 'https://conflict-zero-api.onrender.com/api/v3';
        let token = localStorage.getItem('cz_token');
        
        if (!token) {
            window.location.href = '/login.html';
        }
        
        // Load user and alerts
        async function loadData() {
            try {
                const [userRes, alertsRes] = await Promise.all([
                    fetch(`${API_BASE}/auth/me`, { headers: { 'Authorization': `Bearer ${token}` } }),
                    fetch(`${API_BASE}/alerts`, { headers: { 'Authorization': `Bearer ${token}` } })
                ]);
                
                if (!userRes.ok) throw new Error('Auth failed');
                
                const user = await userRes.json();
                document.getElementById('planBadge').textContent = `Plan ${user.plan_type?.toUpperCase() || 'Profesional'}`;
                
                // Check plan permissions
                if (user.plan_type === 'starter') {
                    document.getElementById('alertForm').style.display = 'none';
                    document.querySelector('.card').innerHTML = '<div class="empty-state"><div class="empty-icon">🔒</div><p>Actualiza a Plan Pro o Enterprise para usar alertas</p></div>';
                }
                
                if (alertsRes.ok) {
                    const alerts = await alertsRes.json();
                    renderAlerts(alerts.alerts || []);
                }
            } catch (err) {
                console.error('Error:', err);
                if (err.message === 'Auth failed') {
                    window.location.href = '/login.html';
                }
            }
        }
        
        function renderAlerts(alerts) {
            const container = document.getElementById('alertsList');
            
            if (!alerts || alerts.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <p>No tienes alertas configuradas</p>
                        <p style="font-size: 12px; margin-top: 8px;">Crea tu primera alerta arriba</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = alerts.map(alert => `
                <div class="alert-item">
                    <div class="alert-info">
                        <span class="alert-type type-${alert.alert_type}">${formatAlertType(alert.alert_type)}</span>
                        <h4>RUC: ${alert.ruc_monitoreado}</h4>
                        <p>Creada: ${new Date(alert.created_at).toLocaleDateString('es-PE')}</p>
                        <p>Umbral: ${alert.threshold_value || 'N/A'}</p>
                    </div>
                    <button class="btn-delete" onclick="deleteAlert('${alert.id}')">Eliminar</button>
                </div>
            `).join('');
        }
        
        function formatAlertType(type) {
            const types = {
                'score_drop': 'Caída de Score',
                'new_sanction': 'Nueva Sanción',
                'status_change': 'Cambio Estado'
            };
            return types[type] || type;
        }
        
        async function handleCreateAlert(e) {
            e.preventDefault();
            
            const type = document.getElementById('alertType').value;
            const ruc = document.getElementById('alertRuc').value;
            const btn = document.getElementById('submitBtn');
            
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Creando...';
            
            try {
                const response = await fetch(`${API_BASE}/alerts`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        alert_type: type,
                        ruc_monitoreado: ruc,
                        threshold_value: type === 'score_drop' ? 60 : null
                    })
                });
                
                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.message || 'Error al crear alerta');
                }
                
                // Reset form and reload
                document.getElementById('alertForm').reset();
                loadData();
                
            } catch (err) {
                alert(err.message || 'Error de conexión');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Crear Alerta';
            }
        }
        
        async function deleteAlert(alertId) {
            if (!confirm('¿Eliminar esta alerta?')) return;
            
            try {
                const response = await fetch(`${API_BASE}/alerts/${alertId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    loadData();
                } else {
                    alert('Error al eliminar alerta');
                }
            } catch (err) {
                alert('Error de conexión');
            }
        }
        
        loadData();
    </script>
</body>
</html>
