services:
  # Web Service - FastAPI Backend
  - type: web
    name: conflict-zero-api
    runtime: python
    plan: starter
    region: oregon
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: conflict-zero-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PERU_API_KEY
        value: d02bb5a71984e759885a4e47a575715c
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"

databases:
  - name: conflict-zero-db
    plan: starter
    region: oregon
