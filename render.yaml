services:
  # Web Service - FastAPI Backend (Docker)
  - type: web
    name: conflict-zero-api
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: conflict-zero-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PERU_API_KEY
        value: d02bb5a71984e759885a4e47a575715c
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: PORT
        value: "8000"

databases:
  - name: conflict-zero-db
    plan: starter
    region: oregon
