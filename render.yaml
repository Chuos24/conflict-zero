name: Conflict Zero API

services:
  - type: web
    name: conflict-zero-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2
    envVars:
      - key: DATABASE_URL
        value: "postgresql://conflict_zero_prod_user:QHsS3TsSfn1LdTlcFBDDTeiijsVColDk@dpg-d71bkh7gi27c73fbq4qg-a/conflict_zero_prod"
      - key: SECRET_KEY
        generateValue: true
      - key: PERU_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_HOSTS
        value: "*"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: WEB_CONCURRENCY
        value: "2"