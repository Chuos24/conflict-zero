services:
  # Web Service - FastAPI Backend
  - type: web
    name: conflict-zero-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: conflict-zero-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PERU_API_KEY
        sync: false  # Manual entry required
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_HOSTS
        value: "*"
      - key: USE_CACHE
        value: "false"

# PostgreSQL Database
databases:
  - name: conflict-zero-db
    plan: free
    region: oregon
    databaseName: conflictzero
    user: conflictzero

# Environment Groups (for sharing config)
envVarGroups:
  - name: conflict-zero-secrets
    envVars:
      - key: PERU_API_KEY
        sync: false
