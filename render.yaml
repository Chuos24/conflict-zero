services:
  # Web Service - FastAPI Backend
  - type: web
    name: conflict-zero-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: |
      cd backend
      pip install -r requirements.txt
    startCommand: |
      cd backend
      uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        value: sqlite:///./conflictzero.db
      - key: SECRET_KEY
        generateValue: true
      - key: PERU_API_KEY
        value: d02bb5a71984e759885a4e47a575715c
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_HOSTS
        value: "*"
      - key: USE_CACHE
        value: "false"
    disk:
      name: conflictzero-data
      mountPath: /opt/render/project/src/backend
      sizeGB: 1
