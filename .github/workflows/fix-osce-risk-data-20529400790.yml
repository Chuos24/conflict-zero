name: Fix osce_risk_data RUC 20529400790

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Razón de la actualización'
        required: false
        default: 'Actualizar tabla agregada osce_risk_data después de corrección de sanción'

jobs:
  update-risk-data:
    name: Update osce_risk_data for RUC 20529400790
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary sqlalchemy
      
      - name: Update osce_risk_data
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd backend/scripts
          python update_osce_risk_data_20529400790.py
      
      - name: Verify Update
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd backend
          python3 -c "
          import os
          from sqlalchemy import create_engine, text
          engine = create_engine(os.environ['DATABASE_URL'])
          with engine.connect() as conn:
              result = conn.execute(text(\"SELECT * FROM osce_risk_data WHERE ruc = '20529400790'\")).fetchone()
              if result:
                  print(f'RUC: {result.ruc}')
                  print(f'Sanciones vigentes: {result.sanciones_vigentes}')
                  print(f'Score OSCE: {result.score_osce_anual}')
                  if result.sanciones_vigentes == 0 and result.score_osce_anual >= 90:
                      print('\\n✅ Datos correctamente actualizados')
                  else:
                      print('\\n⚠️ Revisar datos')
              else:
                  print('No se encontró el registro')
          "
