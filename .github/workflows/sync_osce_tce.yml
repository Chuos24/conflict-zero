name: Sync OSCE/TCE Data

on:
  schedule:
    # Ejecutar diariamente a las 05:00 AM (Lima - UTC-5)
    # Cron usa UTC, así que 05:00 AM Lima = 10:00 AM UTC
    - cron: '0 10 * * *'
  
  # Permitir ejecución manual desde GitHub
  workflow_dispatch:
    inputs:
      force_download:
        description: 'Forzar descarga de datasets aunque existan'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  sync-osce-data:
    name: Sync OSCE Risk Data
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary requests
      
      - name: Run OSCE Data Ingestion
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd backend/scripts
          python osce_ingestion.py
      
      - name: Run TCE Data Ingestion
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd backend/scripts
          python tce_ingestion.py
      
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ingestion-logs
          path: |
            backend/scripts/*.log
            /tmp/*.log
          retention-days: 7
      
      - name: Notify on success
        if: success()
        run: |
          echo "✅ OSCE data sync completed successfully at $(date)"
          echo "Database: ${{ secrets.DATABASE_URL }}"
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ OSCE data sync failed at $(date)"
          # Aquí podrías agregar notificación a Slack, email, etc.
