name: Fix RUC 20529400790 Sanction Data

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Razón de la actualización'
        required: false
        default: 'Actualización manual de sanción reducida por Resolución 6981-2025-TCP-S4'

jobs:
  update-sancion:
    name: Update RUC 20529400790 Sanction
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary sqlalchemy
      
      - name: Update RUC 20529400790
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd backend/scripts
          python update_sancion_20529400790.py
      
      - name: Verify Update
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd backend
          python3 -c "
          import os
          from sqlalchemy import create_engine, text
          engine = create_engine(os.environ['DATABASE_URL'])
          with engine.connect() as conn:
              result = conn.execute(text(\"SELECT * FROM osce_sanciones_detalle WHERE ruc = '20529400790'\")).fetchone()
              if result:
                  print(f'RUC: {result.ruc}')
                  print(f'Resolución: {result.numero_resolucion}')
                  print(f'Fecha inicio: {result.fecha_inicio}')
                  print(f'Fecha fin: {result.fecha_fin}')
                  print(f'Estado: {result.estado}')
                  print(f'Motivo: {result.motivo[:100]}...' if result.motivo and len(result.motivo) > 100 else f'Motivo: {result.motivo}')
              else:
                  print('No se encontró el registro')
          "
      
      - name: Notify success
        run: |
          echo "✅ RUC 20529400790 actualizado correctamente"
          echo "Nueva fecha fin: 2025-12-31"
          echo "Nuevo estado: VENCIDA"
