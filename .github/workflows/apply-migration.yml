name: Apply Database Migration SQL

on:
  workflow_dispatch:
  
jobs:
  migrate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
      
      - name: Execute Migration SQL
        env:
          PGPASSWORD: bZjDxmlk8s6JwLfJ5K9nPqR2S3TvWxY4
        run: |
          psql \
            -h dpg-d8kgvve3kl4c73811s90-a.oregon-postgres.render.com \
            -U conflict_zero_user \
            -d conflict_zero_2b9a \
            -c "BEGIN; CREATE INDEX IF NOT EXISTS idx_users_email ON users(email); CREATE INDEX IF NOT EXISTS idx_users_created_at ON users(created_at); CREATE INDEX IF NOT EXISTS idx_verifications_ruc ON verifications(ruc); CREATE INDEX IF NOT EXISTS idx_verifications_user_id ON verifications(user_id); CREATE INDEX IF NOT EXISTS idx_verifications_created_at ON verifications(created_at); CREATE INDEX IF NOT EXISTS idx_verifications_user_created ON verifications(user_id, created_at DESC); CREATE INDEX IF NOT EXISTS idx_searches_user_id ON search_history(user_id); CREATE INDEX IF NOT EXISTS idx_searches_created_at ON search_history(created_at); CREATE INDEX IF NOT EXISTS idx_tags_user_id ON tags(user_id); CREATE INDEX IF NOT EXISTS idx_ruc_tags_ruc ON ruc_tags(ruc); CREATE INDEX IF NOT EXISTS idx_ruc_tags_tag_id ON ruc_tags(tag_id); COMMIT;"
      
      - name: Verify Migration
        env:
          PGPASSWORD: bZjDxmlk8s6JwLfJ5K9nPqR2S3TvWxY4
        run: |
          psql \
            -h dpg-d8kgvve3kl4c73811s90-a.oregon-postgres.render.com \
            -U conflict_zero_user \
            -d conflict_zero_2b9a \
            -c "SELECT indexname FROM pg_indexes WHERE schemaname='public' AND indexname LIKE 'idx_%' ORDER BY indexname;"
