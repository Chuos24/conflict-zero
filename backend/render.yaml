name: Conflict Zero API

services:
  - type: web
    name: conflict-zero-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: conflict-zero-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PERU_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_HOSTS
        value: "*"

databases:
  - name: conflict-zero-db
    plan: free
    databaseName: conflictzero
    user: conflictzero
