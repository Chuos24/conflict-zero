name: Conflict Zero API

services:
  - type: web
    name: conflict-zero-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: conflict-zero-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PERU_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_HOSTS
        value: "*"
      # Email Configuration (SendGrid recomendado)
      - key: EMAIL_FROM
        value: "noreply@czperu.com"
      - key: EMAIL_FROM_NAME
        value: "Conflict Zero"
      - key: SENDGRID_API_KEY
        sync: false  # Configurar en dashboard de Render
      # AWS (opcional - para SES o S3)
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: "us-east-1"
      - key: S3_BUCKET
        value: "conflictzero-certificados-prod"
      # Stripe (para pagos)
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

databases:
  - name: conflict-zero-db
    plan: free
    databaseName: conflictzero
    user: conflictzero
